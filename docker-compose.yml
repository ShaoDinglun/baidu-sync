services:
  baidu-autosave:
    build:
      context: .
      dockerfile: Dockerfile
    image: baidu-autosave:local
    container_name: baidu-autosave
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./config:/app/config
      - ./log:/app/log
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
      - BAIDU_AUTOSAVE_DEFAULT_PASSWORD=change-this-password